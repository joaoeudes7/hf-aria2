name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install aria2
        run: sudo apt-get update && sudo apt-get install -y aria2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install project
        run: uv sync --all-extras

      - name: Check help output
        run: uv run hf-aria --help

      - name: Check dry-run against tiny model
        run: |
          uv run hf-aria hf-internal-testing/tiny-random-bert \
            --include "*.safetensors" --dry-run --yes

      - name: Check urls-only
        run: |
          uv run hf-aria hf-internal-testing/tiny-random-bert \
            --include "*.safetensors" --dry-run --urls-only

      - name: Install alias test (bash)
        run: uv run hf-aria --install-alias bash

  release:
    needs: [test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build
        run: uv build

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*.tar.gz dist/*.whl
